name: Build Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            suffix: macos-arm64
          - os: macos-13
            suffix: macos-x64
          - os: ubuntu-latest
            suffix: linux-x64
          - os: windows-latest
            suffix: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        shell: bash
        env:
          OUT: loop-${{ matrix.suffix }}
        run: |
          ./scripts/build-bun.sh
          if [ "${{ matrix.os }}" = "windows-latest" ] && [ ! -f "loop-${{ matrix.suffix }}.exe" ]; then
            mv "loop-${{ matrix.suffix }}" "loop-${{ matrix.suffix }}.exe"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-${{ matrix.suffix }}
          path: |
            loop-${{ matrix.suffix }}
            loop-${{ matrix.suffix }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/loop-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
